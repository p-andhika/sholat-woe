name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)

          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            RANGE=$(git rev-list --max-parents=0 HEAD)..${TAG}
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Collect commits by type
          FEATS=$(git log "$RANGE" --oneline --grep="^feat" --format="- %s" | sed 's/^- feat: /- /' | sed 's/^- feat(/- (/')
          FIXES=$(git log "$RANGE" --oneline --grep="^fix" --format="- %s" | sed 's/^- fix: /- /' | sed 's/^- fix(/- (/')
          OTHERS=$(git log "$RANGE" --oneline --grep="^refactor\|^perf\|^docs" --format="- %s" | sed 's/^- [a-z]*: /- /' | sed 's/^- [a-z]*(/- (/')

          # Build the new section
          SECTION="## [${VERSION}] - ${DATE}"
          if [ -n "$FEATS" ]; then
            SECTION="${SECTION}\n\n### Added\n\n${FEATS}"
          fi
          if [ -n "$FIXES" ]; then
            SECTION="${SECTION}\n\n### Fixed\n\n${FIXES}"
          fi
          if [ -n "$OTHERS" ]; then
            SECTION="${SECTION}\n\n### Changed\n\n${OTHERS}"
          fi

          # Insert after the header line in CHANGELOG.md
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "Changelog entry for ${VERSION} already exists, skipping."
          else
            sed -i "/^# Changelog/,/^## \[/ {
              /^## \[/ i\\
$(echo -e "$SECTION" | sed 's/$/\\/')

            }" CHANGELOG.md
          fi

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

  build:
    needs: update-changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS (Apple Silicon)'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS (Intel)'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin' && 'x86_64-apple-darwin' || '' }}

      - name: Install macOS Intel target
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Sholat Woe ${{ github.ref_name }}'
          releaseBody: |
            ## What's New

            See [CHANGELOG.md](https://github.com/p-andhika/sholat-woe/blob/main/CHANGELOG.md) for details.

            ## Installation

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: Download `Sholat-Woe_*_aarch64.dmg`
            - **Intel**: Download `Sholat-Woe_*_x64.dmg`
            - Open the DMG and drag to Applications
            - **Important**: macOS will block the app. Run this command to allow it:
              ```bash
              xattr -cr "/Applications/Sholat Woe.app"
              ```

            ### Windows
            - Download `Sholat-Woe_*_x64-setup.exe`
            - Run the installer

            ### Linux
            - Download `sholat-woe_*_amd64.AppImage` (portable, no install needed)
            - Or use `.deb` package for Debian/Ubuntu

            ## Note

            macOS builds are currently unsigned. Code signing will be added in a future release.

          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
